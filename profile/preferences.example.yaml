# Cheap deterministic prefilter — runs before any LLM sees a posting.
# Copy to profile/preferences.yaml (gitignored) and edit for yourself.
# Matching is case-insensitive substring. Empty include list = match all.
titles:
  include:
    - engineer
    - developer
    - data
  exclude:
    - director
    - principal
    - intern
locations:
  include:
    - remote
    - united states
    - ", ca"
    - ", ny"
    - ", tx"
  exclude: []
# Phase 2 agent: minimum match score (0-100) before a tailored package is prepared.
agent:
  threshold: 70
